<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triangle Cafe and Restro Menu</title>
  <link rel="stylesheet" href="mstyle.css" />
</head>
<body>
  <main class="app">
    <section class="header">
      <h2 class="eyebrow">Triangle Cafe and Restro Menu</h2>
      <p class="eyebrow">9856068630</p>
        
    </section>

    <section class="book-shell" aria-label="Flip book menu">
      <div class="book" id="book" aria-label="Flip book page viewer">
        <div class="page-turn" id="pageTurn">
          <img id="pageImage" src="1.jpeg" alt="Page 1" />
        </div>

        <div class="page-label" id="pageLabel">1 / 10</div>
      </div>

      <div class="controls" aria-label="Page controls">
        <button class="control-btn" id="prevBtn" type="button" aria-label="Previous page">Back</button>
        <button class="control-btn primary" id="nextBtn" type="button" aria-label="Next page">Next</button>
      </div>
    </section>
  </main>

  <script src="mscript.js"></script>
</body>
</html>
